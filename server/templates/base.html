<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Color-Cue Calibration{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f5f5;
      color: #222;
      min-height: 100vh;
    }
    nav {
      background: #2c3e50;
      color: #ecf0f1;
      padding: 0.75rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }
    nav .brand { font-weight: 700; font-size: 1.1rem; }
    nav a { color: #bdc3c7; text-decoration: none; font-size: 0.9rem; }
    nav a:hover { color: #fff; }
    nav .spacer { flex: 1; }
    main {
      max-width: 900px;
      margin: 2rem auto;
      padding: 0 1rem;
    }
    h1 { font-size: 1.6rem; margin-bottom: 1rem; }
    h2 { font-size: 1.2rem; margin-bottom: 0.75rem; color: #34495e; }
    .card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .alert {
      padding: 0.75rem 1rem;
      border-radius: 6px;
      margin-bottom: 1rem;
      font-size: 0.9rem;
    }
    .alert-error { background: #fdecea; color: #c0392b; border: 1px solid #e74c3c; }
    .alert-success { background: #eafaf1; color: #1e8449; border: 1px solid #27ae60; }
    label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.3rem; }
    input[type=text], input[type=password], select, textarea {
      width: 100%;
      padding: 0.5rem 0.75rem;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 0.95rem;
      margin-bottom: 1rem;
    }
    input:focus, select:focus { outline: none; border-color: #2980b9; }
    .btn {
      display: inline-block;
      padding: 0.55rem 1.2rem;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      text-decoration: none;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: #2980b9; color: #fff; }
    .btn-success { background: #27ae60; color: #fff; }
    .btn-danger  { background: #e74c3c; color: #fff; }
    .btn-secondary { background: #95a5a6; color: #fff; }
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    th { background: #ecf0f1; text-align: left; padding: 0.5rem 0.75rem; }
    td { padding: 0.5rem 0.75rem; border-bottom: 1px solid #ecf0f1; }
    tr:last-child td { border-bottom: none; }
    .tag {
      display: inline-block;
      padding: 0.2rem 0.5rem;
      border-radius: 3px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .tag-staircase { background: #d6eaf8; color: #1a5276; }
    .tag-calibrated { background: #d5f5e3; color: #145a32; }
    .form-row { display: flex; gap: 1rem; }
    .form-row > * { flex: 1; }
  </style>
</head>
<body>
  <nav>
    <span class="brand">Color-Cue Calibration</span>
    {% if session.subject_id %}
      <a href="{{ url_for('dashboard') }}">Dashboard</a>
      {% if session.subject_id %}
        <a href="{{ url_for('change_password') }}">Change Password</a>
      {% endif %}
      <span class="spacer"></span>
      <span style="font-size:0.85rem">{{ session.subject_id }}</span>
      <a href="{{ url_for('logout') }}">Log out</a>
    {% endif %}
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
